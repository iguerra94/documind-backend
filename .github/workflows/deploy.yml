name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::253490749577:role/github-actions-documind-deploy-role
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t documind-backend:${{ github.sha }} .

      - name: Tag Docker image
        run: docker tag documind-backend:${{ github.sha }} 253490749577.dkr.ecr.us-east-1.amazonaws.com/documind-backend:${{ github.sha }}

      - name: Push Docker image
        run: docker push 253490749577.dkr.ecr.us-east-1.amazonaws.com/documind-backend:${{ github.sha }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -var="image_tag=${{ github.sha }}"

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      - name: Wait for ECS stability
        run: aws ecs wait services-stable --cluster documind-cluster --services documind-service --region us-east-1

      - name: Check readiness endpoint
        run: curl -f http://documind-alb-1947393645.us-east-1.elb.amazonaws.com/actuator/health/readiness
