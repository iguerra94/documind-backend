name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "demo-docs/**"
      - "README.md"
      - "HELP.md"

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      TF_INPUT: "false"
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_bedrock_knowledge_base_id: ${{ vars.BEDROCK_KNOWLEDGE_BASE_ID }}
      TF_VAR_bedrock_model_arn: ${{ vars.BEDROCK_MODEL_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        run: |
          test -n "$AWS_REGION" || { echo "Missing GitHub variable: AWS_REGION"; exit 1; }
          test -n "$AWS_ROLE_TO_ASSUME" || { echo "Missing GitHub variable: AWS_ROLE_TO_ASSUME"; exit 1; }
          test -n "$TF_VAR_bedrock_knowledge_base_id" || { echo "Missing GitHub variable: BEDROCK_KNOWLEDGE_BASE_ID"; exit 1; }
          test -n "$TF_VAR_bedrock_model_arn" || { echo "Missing GitHub variable: BEDROCK_MODEL_ARN"; exit 1; }

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build and test jar
        run: ./mvnw clean package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t documind-backend:${{ github.sha }} .

      - name: Tag Docker image
        run: docker tag documind-backend:${{ github.sha }} 253490749577.dkr.ecr.us-east-1.amazonaws.com/documind-backend:${{ github.sha }}

      - name: Push Docker image
        run: docker push 253490749577.dkr.ecr.us-east-1.amazonaws.com/documind-backend:${{ github.sha }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: infra/terraform
        run: terraform plan -input=false -lock-timeout=5m -var="image_tag=${{ github.sha }}"

      - name: Terraform apply
        working-directory: infra/terraform
        run: terraform apply -input=false -lock-timeout=5m -auto-approve -var="image_tag=${{ github.sha }}"

      - name: Wait for ECS stability
        run: aws ecs wait services-stable --cluster documind-cluster --services documind-service --region "$AWS_REGION"

      - name: Check readiness endpoint
        run: curl -f http://documind-alb-1947393645.us-east-1.elb.amazonaws.com/actuator/health/readiness
